<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internal Bank Management</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header>
        <h1>Internal Bank Management</h1>
        <p>Create accounts and run deposits, withdrawals, and transfers.</p>
      </header>

      <section class="panel">
        <h2>Create account</h2>
        <form id="create-account-form">
          <label>
            Holder name
            <input id="holder-name" name="name" required />
          </label>
          <label>
            Initial balance
            <input id="initial-balance" name="balance" type="number" min="1000" step="0.01" required />
          </label>
          <button type="submit">Create account</button>
        </form>
        <div id="create-account-result" class="result"></div>
      </section>

      <section class="panel grid">
        <div>
          <h2>Deposit</h2>
          <form id="deposit-form">
            <label>
              Account ID
              <input id="deposit-id" name="accountId" type="number" required />
            </label>
            <label>
              Amount
              <input id="deposit-amount" name="amount" type="number" step="0.01" min="0.01" required />
            </label>
            <button type="submit">Deposit</button>
          </form>
          <div id="deposit-result" class="result"></div>
        </div>

        <div>
          <h2>Withdraw</h2>
          <form id="withdraw-form">
            <label>
              Account ID
              <input id="withdraw-id" name="accountId" type="number" required />
            </label>
            <label>
              Amount
              <input id="withdraw-amount" name="amount" type="number" step="0.01" min="10" required />
            </label>
            <button type="submit">Withdraw</button>
          </form>
          <div id="withdraw-result" class="result"></div>
        </div>
      </section>

      <section class="panel">
        <h2>Transfer</h2>
        <form id="transfer-form">
          <label>
            From account ID
            <input id="transfer-from" name="fromAccount" type="number" required />
          </label>
          <label>
            To account ID
            <input id="transfer-to" name="toAccount" type="number" required />
          </label>
          <label>
            Amount
            <input id="transfer-amount" name="amount" type="number" step="0.01" min="0.01" required />
          </label>
          <button type="submit">Transfer</button>
        </form>
        <div id="transfer-result" class="result"></div>
      </section>

      <section class="panel">
        <div class="section-header">
          <h2>Accounts</h2>
          <button id="refresh-accounts" type="button">Refresh</button>
        </div>
        <div id="accounts-list" class="accounts-list"></div>
      </section>

      <section class="panel">
        <h2>Transactions</h2>
        <div id="transactions-list" class="transactions-list"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
